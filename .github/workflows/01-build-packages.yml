---
name: Build Packages

on:
  workflow_call:

jobs:
  build-stencil-targets:
    name: Build Packages
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: â¬ Checkout repo
        uses: actions/checkout@v4

      - name: ğŸ”„ Init Cache
        uses: ./.github/actions/npm-cache

      - name: ğŸ”¨ Build Packages
        run: npm run build

      - name: â« Upload foundations build
        uses: actions/upload-artifact@v4
        with:
          name: db-ui-foundations-build
          path: packages/foundations/build

      - name: â« Upload output
        uses: actions/upload-artifact@v4
        with:
          name: db-ui-output
          path: output

      - name: â« Upload components build
        uses: actions/upload-artifact@v4
        with:
          name: db-ui-components-build
          path: packages/components/build

      - name: â« Upload migration build
        uses: actions/upload-artifact@v4
        with:
          name: db-ui-migration-build
          path: packages/migration/build

      - name: ğŸ’€ Killing me softly
        uses: ./.github/actions/cancel-workflow
        if: failure()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
